<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{TITLE}}</title>
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--vscode-font-family);
  font-size: var(--vscode-font-size);
  color: var(--vscode-foreground);
  background: var(--vscode-editor-background);
  padding: 28px 36px;
  max-width: 500px;
}
h2 { margin-bottom: 22px; font-size: 1.1em; font-weight: 600; }
.field { margin-bottom: 14px; }
label { display: block; margin-bottom: 4px; font-size: 0.85em; opacity: 0.75; }
input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--vscode-input-border, #888);
  background: var(--vscode-input-background);
  color: var(--vscode-input-foreground);
  border-radius: 3px;
  font-size: 1em;
  outline: none;
}
input:focus { border-color: var(--vscode-focusBorder); }
.row { display: flex; gap: 10px; }
.row .field { flex: 1; }
.actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
button {
  padding: 6px 16px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 0.92em;
  font-family: inherit;
}
.btn-primary { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
.btn-primary:hover { background: var(--vscode-button-hoverBackground); }
.btn-secondary { background: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground); }
.btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground); }
.btn-danger { background: transparent; color: var(--vscode-errorForeground, #f48771); border: 1px solid currentColor; margin-left: auto; }
.btn-danger:hover { opacity: 0.8; }
#status {
  margin-top: 14px; padding: 8px 12px; border-radius: 3px;
  font-size: 0.88em; display: none;
}
#status.connecting { background: var(--vscode-editorInfo-background, #1e3a5f); color: #9cdcfe; }
#status.ok   { background: #1a3a1a; color: #89d185; }
#status.error { background: var(--vscode-inputValidation-errorBackground, #5a1d1d); color: #f48771; }
</style>
</head>
<body>
<h2>{{HEADING}}</h2>
<input type="hidden" id="conn-id"/>
<div class="field">
  <label for="name">连接名称</label>
  <input id="name" type="text" placeholder="My MySQL"/>
</div>
<div class="row">
  <div class="field">
    <label for="host">主机地址</label>
    <input id="host" type="text" placeholder="localhost"/>
  </div>
  <div class="field" style="max-width:110px">
    <label for="port">端口</label>
    <input id="port" type="number" placeholder="3306"/>
  </div>
</div>
<div class="field">
  <label for="user">用户名</label>
  <input id="user" type="text" placeholder="root"/>
</div>
<div class="field">
  <label for="password">密码</label>
  <div style="display:flex;align-items:center;gap:6px;">
    <input id="password" type="password" placeholder="输入密码" style="flex:1;"/>
    <button id="toggle-pwd" type="button" title="显示/隐藏密码" style="background:transparent;border:none;cursor:pointer;font-size:1.05em;">👁️</button>
  </div>
</div>
<div class="field">
  <label for="database">默认数据库 <span style="opacity:0.5">(可选)</span></label>
  <input id="database" type="text" placeholder="留空则显示所有数据库"/>
</div>
<div class="field">
  <label><input id="ssh-enabled" type="checkbox"/> 启用 SSH 隧道</label>
</div>
<div id="ssh-section" style="display:none; padding:8px 10px; border:1px dashed var(--vscode-input-border); border-radius:4px; margin-bottom:12px;">
  <div class="field">
    <label for="ssh-host">SSH 主机</label>
    <input id="ssh-host" type="text" placeholder="ssh.example.com"/>
  </div>
  <div class="row">
    <div class="field">
      <label for="ssh-port">SSH 端口</label>
      <input id="ssh-port" type="number" placeholder="22"/>
    </div>
    <div class="field">
      <label for="ssh-user">SSH 用户</label>
      <input id="ssh-user" type="text" placeholder="sshuser"/>
    </div>
  </div>
  <div class="field">
    <label for="ssh-password">SSH 密码 <span style="opacity:0.6">(或留空使用私钥)</span></label>
    <div style="display:flex;align-items:center;gap:6px;">
      <input id="ssh-password" type="password" placeholder="SSH password" style="flex:1;"/>
      <button id="toggle-ssh-pwd" type="button" title="显示/隐藏 SSH 密码" style="background:transparent;border:none;cursor:pointer;font-size:1.05em;">👁️</button>
    </div>
  </div>
  <div class="field">
    <label for="ssh-privateKey">私钥路径 <span style="opacity:0.6">(例如 ~/.ssh/id_rsa)</span></label>
    <input id="ssh-privateKey" type="text" placeholder="/Users/you/.ssh/id_rsa"/>
  </div>
  <div class="field">
    <label for="ssh-passphrase">私钥口令 <span style="opacity:0.6">(如果适用)</span></label>
    <input id="ssh-passphrase" type="password" placeholder="passphrase"/>
  </div>
</div>
<div class="actions">
  <button class="btn-primary" onclick="save()">保存</button>
  <button class="btn-primary" onclick="test()">测试连接</button>
  {{DELETE_BTN}}
</div>
<div id="status"></div>

<script>
const vscode = acquireVsCodeApi();
vscode.postMessage({ command: 'ready' });

window.addEventListener('message', function(e) {
  const msg = e.data;
  if (msg.type === 'init') {
    const cfg = msg.cfg;
    if (cfg) {
      document.getElementById('conn-id').value   = cfg.id;
      document.getElementById('name').value      = cfg.name;
      document.getElementById('host').value      = cfg.host;
      document.getElementById('port').value      = cfg.port;
      document.getElementById('user').value      = cfg.user;
      document.getElementById('database').value  = cfg.database || '';
      document.getElementById('password').value  = msg.pwd || '';
          document.getElementById('ssh-enabled').checked = cfg?.sshEnabled ? true : false;
          document.getElementById('ssh-host').value = cfg?.sshHost || '';
          document.getElementById('ssh-port').value = cfg?.sshPort || '';
          document.getElementById('ssh-user').value = cfg?.sshUser || '';
          document.getElementById('ssh-password').value = cfg?.sshPassword || '';
          document.getElementById('ssh-privateKey').value = cfg?.sshPrivateKey || '';
          document.getElementById('ssh-passphrase').value = cfg?.sshPassphrase || '';
          toggleSshSection();
    } else {
      document.getElementById('host').value = 'localhost';
      document.getElementById('port').value = '3306';
      document.getElementById('user').value = 'root';
    }
  } else if (msg.type === 'connecting' || msg.type === 'ok' || msg.type === 'error') {
    const s = document.getElementById('status');
    s.className = msg.type;
    s.textContent = msg.message;
    s.style.display = 'block';
  }
});

function collect() {
  return {
    id:       document.getElementById('conn-id').value || undefined,
    name:     document.getElementById('name').value.trim(),
    host:     document.getElementById('host').value.trim(),
    port:     document.getElementById('port').value.trim(),
    user:     document.getElementById('user').value.trim(),
    database: document.getElementById('database').value.trim(),
    password: document.getElementById('password').value,
    sshEnabled: document.getElementById('ssh-enabled').checked,
    sshHost: document.getElementById('ssh-host').value.trim(),
    sshPort: document.getElementById('ssh-port').value.trim(),
    sshUser: document.getElementById('ssh-user').value.trim(),
    sshPassword: document.getElementById('ssh-password').value,
    sshPrivateKey: document.getElementById('ssh-privateKey').value.trim(),
    sshPassphrase: document.getElementById('ssh-passphrase').value
  };
}
function save() { vscode.postMessage({ command: 'save', ...collect() }); }
function test() { vscode.postMessage({ command: 'test', ...collect() }); }
function del()  { vscode.postMessage({ command: 'delete', id: document.getElementById('conn-id').value }); }

document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter' && (ev.metaKey || ev.ctrlKey)) save();
});

document.getElementById('ssh-enabled').addEventListener('change', toggleSshSection);
function toggleSshSection() {
  const en = document.getElementById('ssh-enabled').checked;
  document.getElementById('ssh-section').style.display = en ? 'block' : 'none';
}

// Toggle password visibility for MySQL and SSH password fields
document.getElementById('toggle-pwd').addEventListener('click', () => togglePassword('password', 'toggle-pwd'));
document.getElementById('toggle-ssh-pwd').addEventListener('click', () => togglePassword('ssh-password', 'toggle-ssh-pwd'));
function togglePassword(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (!inp || !btn) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
</body>
</html>
